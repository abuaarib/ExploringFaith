<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Religion + History Exploratorium</title>
    <meta
      name="description"
      content="An interactive browser-ready exploratorium of recurring structures across documented religions and historical societies."
    />
    <style>
      :root {
        --bg: #07070a;
        --panel: rgba(15, 15, 20, 0.9);
        --panel-2: rgba(22, 22, 30, 0.92);
        --text: #f5f7fb;
        --muted: #adb3c2;
        --muted-2: #7f8798;
        --border: rgba(255, 255, 255, 0.1);
        --accent: #eef2ff;
        --accent-text: #0b0c10;
        --accent-2: #9cc4ff;
        --shadow: 0 24px 64px rgba(0, 0, 0, 0.34);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        background:
          radial-gradient(circle at 0% 0%, rgba(255,255,255,0.05), transparent 22%),
          radial-gradient(circle at 100% 10%, rgba(142,187,255,0.09), transparent 20%),
          radial-gradient(circle at 80% 85%, rgba(178,119,255,0.08), transparent 22%),
          linear-gradient(180deg, #08080b 0%, #07070a 100%);
      }
      a { color: inherit; text-decoration: none; }
      button, input { font: inherit; }
      .container { max-width: 1440px; margin: 0 auto; padding: 22px; }
      .grid { display: grid; gap: 22px; }
      .hero-grid { grid-template-columns: 1.2fr 0.8fr; }
      .main-grid { grid-template-columns: 360px minmax(0, 1fr); align-items: start; }
      .card {
        position: relative;
        overflow: hidden;
        background: linear-gradient(180deg, rgba(15,15,20,0.94), rgba(9,9,13,0.96));
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(140deg, rgba(255,255,255,0.04), transparent 28%, transparent 60%, rgba(255,255,255,0.02));
      }
      .card-body { position: relative; padding: 24px; }
      .pill {
        display: inline-flex; align-items: center; gap: 8px;
        border-radius: 999px; border: 1px solid var(--border);
        background: rgba(255,255,255,0.05); padding: 9px 14px; font-size: 0.9rem;
      }
      .hero-title {
        margin: 16px 0 0;
        font-size: clamp(2.5rem, 5vw, 5rem);
        line-height: 0.98;
        letter-spacing: -0.05em;
        max-width: 12ch;
      }
      .hero-copy, .muted { color: var(--muted); }
      .hero-copy { margin-top: 14px; font-size: 1.06rem; line-height: 1.82; max-width: 62ch; }
      .spine {
        margin-top: 20px; padding: 20px; border-radius: var(--radius-lg);
        border: 1px solid var(--border); background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
        color: #d9e0ec; line-height: 1.78;
      }
      .hero-stats, .flash-grid, .footer-grid, .metric-row { display: grid; gap: 14px; }
      .hero-stats, .metric-row, .footer-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .flash-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-top: 14px; }
      .stat, .metric-box, .flash-card, .example-card, .source-link, .timeline-event, .cross-link {
        border: 1px solid var(--border); border-radius: 20px; background: rgba(0,0,0,0.2); padding: 16px;
      }
      .stat-number { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.03em; }
      .stat-label, .small, .example-note, .source-url, .cross-copy { color: var(--muted); line-height: 1.7; }
      .top-strip { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 18px; margin-top: 22px; }
      .story-paths, .toggle-row, .small-toggle-row, .navigator, .tag-row { display: flex; flex-wrap: wrap; gap: 10px; }
      .path-btn, .toggle, .small-btn, .chip {
        border: 1px solid var(--border); border-radius: 999px; background: rgba(255,255,255,0.03);
        color: var(--text); padding: 10px 14px; cursor: pointer; transition: 0.18s ease;
      }
      .toggle { flex: 1; min-width: 92px; border-radius: 16px; }
      .path-btn:hover, .toggle:hover, .small-btn:hover, .chip:hover, .node-btn:hover, .flash-card:hover, .source-link:hover, .cross-link:hover {
        transform: translateY(-2px); border-color: rgba(255,255,255,0.18); box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      }
      .active-ui { background: var(--accent) !important; color: var(--accent-text) !important; border-color: var(--accent) !important; }
      .eyebrow { color: var(--muted-2); text-transform: uppercase; letter-spacing: 0.16em; font-size: 0.72rem; margin-bottom: 10px; }
      h1, h2, h3, p { margin: 0; }
      h2 { font-size: clamp(1.95rem, 2.8vw, 3.4rem); line-height: 1.02; letter-spacing: -0.04em; }
      h3 { font-size: 1.12rem; }
      .lead { margin-top: 12px; color: #d7deea; line-height: 1.82; font-size: 1.05rem; max-width: 62ch; }
      .insight-banner {
        padding: 16px 18px; border-radius: 22px; border: 1px solid rgba(156,196,255,0.24);
        background: linear-gradient(135deg, rgba(156,196,255,0.12), rgba(184,120,255,0.1)); color: #e8eefc; line-height: 1.76;
      }
      .sidebar { position: sticky; top: 16px; max-height: calc(100vh - 32px); }
      .sidebar .card-body { display: flex; flex-direction: column; gap: 16px; height: 100%; min-height: 0; }
      .search-wrap { position: relative; }
      .search-input {
        width: 100%; background: rgba(255,255,255,0.03); color: var(--text); border: 1px solid var(--border);
        border-radius: 18px; padding: 14px 14px 14px 42px; outline: none;
      }
      .search-input:focus { border-color: rgba(156,196,255,0.45); box-shadow: 0 0 0 4px rgba(156,196,255,0.08); }
      .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--muted-2); }
      .node-list { overflow: auto; display: flex; flex-direction: column; gap: 12px; flex: 1; min-height: 0; padding-right: 6px; }
      .node-btn {
        width: 100%; text-align: left; padding: 16px; border-radius: 24px; border: 1px solid var(--border);
        background: rgba(255,255,255,0.02); color: var(--text); cursor: pointer; transition: 0.18s ease;
      }
      .node-top { display: flex; gap: 12px; align-items: flex-start; }
      .node-icon {
        width: 38px; height: 38px; border-radius: 14px; display: grid; place-items: center;
        background: rgba(255,255,255,0.06); color: var(--accent-2); flex: 0 0 auto;
      }
      .node-title { font-weight: 700; }
      .node-sub { margin-top: 7px; color: var(--muted); line-height: 1.62; font-size: 0.95rem; }
      .mini-chip {
        display: inline-block; margin-top: 10px; margin-right: 8px; padding: 6px 10px; font-size: 0.76rem;
        border-radius: 999px; border: 1px solid rgba(255,255,255,0.08); color: var(--muted-2);
      }
      .content-card { min-height: 74vh; }
      .two-grid, .split-grid, .library-grid { display: grid; gap: 18px; }
      .two-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .split-grid { grid-template-columns: 1.08fr 0.92fr; }
      .library-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); margin-top: 24px; }
      .inner-card {
        border-radius: 24px; border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)); padding: 20px;
      }
      .stack { display: flex; flex-direction: column; gap: 16px; }
      .timeline { display: flex; flex-direction: column; gap: 12px; }
      .timeline-era { color: var(--muted-2); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.14em; }
      .cross-grid { display: grid; gap: 12px; }
      .cross-link { cursor: pointer; text-align: left; color: var(--text); }
      .cross-title, .source-title, .example-title { font-weight: 700; }
      .source-url { margin-top: 8px; font-size: 0.82rem; word-break: break-word; }
      .empty-state { color: var(--muted); line-height: 1.78; padding: 10px 0 4px; }
      .footer-note { margin-top: 12px; color: var(--muted-2); font-size: 0.9rem; line-height: 1.68; }
      @media (max-width: 1200px) {
        .hero-grid, .main-grid, .top-strip, .hero-stats, .flash-grid, .metric-row, .two-grid, .split-grid, .footer-grid, .library-grid { grid-template-columns: 1fr; }
        .sidebar { position: static; max-height: none; }
        .hero-title { max-width: none; }
      }
      @media (max-width: 760px) {
        .container { padding: 16px; }
        .card-body { padding: 18px; }
        .hero-copy, .lead, .spine { font-size: 0.98rem; }
      }
    </style>
  </head>
  <body>
    <div class="container" id="app"></div>

    <script>
      const themes = [
        {
          id: "survival-kinship",
          icon: "◉",
          title: "Survival, Kinship, and Group Size",
          shortTitle: "Kinship",
          thesis: "Humans begin vulnerable, so care networks scale from parent to family to clan to society. Religion and custom often stabilize belonging, obligation, trust, and inheritance.",
          whyItRepeats: "Human children develop slowly. That makes caregiving, alliance, inheritance, elder authority, and memory of descent central across cultures.",
          insight: "The first temple may have been the family itself: a place where memory, duty, and continuity were rehearsed before they were formalized in stone.",
          flash: "If human babies were born nearly self-sufficient, much of moral order would likely look different. Extended helplessness is one of religion's hidden architects.",
          examples: [
            { label: "Kinship and ancestor lineages in many traditional societies", note: "Ancestors, family memory, and lineage obligations often anchor social identity long before centralized states." },
            { label: "Ancient Rome, China, and many African traditions", note: "Household rites and ancestor reverence connect family continuity to cosmic or social order." },
            { label: "Abrahamic traditions", note: "Marriage, inheritance, covenant, and communal obligation are bound to sacred law and narrative identity." },
            { label: "Clan-based societies", note: "Obligation, revenge, alliance, and ritual often travel first through kin lines, not abstract citizenship." }
          ],
          timeline: [
            { era: "Pre-state societies", note: "Kinship structures organize care, identity, and obligation before formal bureaucratic law." },
            { era: "Ancient civilizations", note: "Household cults and ancestor rites connect family continuity to the order of the cosmos." },
            { era: "Religious law traditions", note: "Family becomes a legal and sacred unit with divine sanction." }
          ],
          links: [
            { title: "Stanford Encyclopedia: The Concept of Religion", url: "https://plato.stanford.edu/entries/concept-religion/" },
            { title: "Britannica: Ancestor Worship", url: "https://www.britannica.com/topic/ancestor-worship" },
            { title: "Britannica Students: Ancestor Worship", url: "https://kids.britannica.com/students/article/ancestor-worship/272853" }
          ],
          tags: ["kinship", "lineage", "identity", "belonging"],
          pathways: ["death-afterlife", "law-order", "story-symbol"]
        },
        {
          id: "death-afterlife",
          icon: "✢",
          title: "Death, Burial, and Afterlife",
          shortTitle: "Death",
          thesis: "Across documented cultures, death is rarely left as raw biological ending. Burial, funerary rites, mourning systems, and afterlife beliefs transform loss into continuity.",
          whyItRepeats: "Death threatens emotional stability, identity continuity, and group order. Ritual and story help make the dead legible to the living.",
          insight: "Humans do not merely bury bodies. They bury chaos. Funeral ritual is one of the oldest technologies for stopping grief from dissolving the social world.",
          flash: "A grave is both evidence of mortality and a refusal to let mortality have the last word.",
          examples: [
            { label: "Neanderthal and early human burials", note: "Archaeological evidence suggests very early attention to the dead, sometimes with grave goods or careful placement." },
            { label: "Ancient Egypt", note: "Mummification, tomb texts, judgment scenes, and elaborate preparation map death into a meaningful journey." },
            { label: "Greek, Hindu, Christian, Islamic, and many other traditions", note: "Different metaphysics, same structural move: the dead are ritually processed, morally situated, and narratively continued." },
            { label: "Ancestor offerings and memorial rites", note: "The dead remain socially relevant through feeding, remembrance, name-keeping, and periodic ritual return." }
          ],
          timeline: [
            { era: "Prehistory", note: "Burial practice appears early, suggesting symbolic attention to death long predates modern doctrine." },
            { era: "Ancient temple societies", note: "Afterlife becomes mapped, judged, narrated, and materially supported with texts and grave goods." },
            { era: "World religions", note: "Moral frameworks and salvation narratives integrate the dead into cosmic meaning." }
          ],
          links: [
            { title: "Britannica: Afterlife", url: "https://www.britannica.com/topic/afterlife-religion" },
            { title: "World History Encyclopedia: Burial", url: "https://www.worldhistory.org/burial/" },
            { title: "The Met: Death, Burial, and the Afterlife in Ancient Greece", url: "https://www.metmuseum.org/essays/death-burial-and-the-afterlife-in-ancient-greece" },
            { title: "Smarthistory: Ancient Egyptian Religious Life and Afterlife", url: "https://smarthistory.org/reframing-art-history/ancient-egyptian-religious-life-and-afterlife/" },
            { title: "Religion Media Centre: Death and Funerals in World Religions", url: "https://religionmediacentre.org.uk/factsheets/death-funeral-rituals-in-world-religions/" }
          ],
          tags: ["death", "burial", "afterlife", "mourning"],
          pathways: ["ritual", "law-order", "story-symbol"]
        },
        {
          id: "ritual",
          icon: "◎",
          title: "Ritual and Repetition",
          shortTitle: "Ritual",
          thesis: "Religions do not survive as ideas alone. They survive through repeated bodily action: prayer, sacrifice, offerings, fasting, initiation, pilgrimage, marriage, and mourning.",
          whyItRepeats: "Ritual turns belief into muscle memory and private feeling into synchronized group behavior.",
          insight: "A belief can be forgotten. A practice can be inherited. Repetition is the bridge by which meaning survives amnesia.",
          flash: "Where thought is unstable, rhythm is loyal. The body remembers what the mind would otherwise drop.",
          examples: [
            { label: "Rites of passage worldwide", note: "Birth, puberty, marriage, and death are repeatedly ritualized because they mark dangerous transitions in identity and status." },
            { label: "Ancient Egypt and Mesopotamia", note: "Offerings, purification, temple care, and prescribed sacred actions are central, not decorative." },
            { label: "Modern religions", note: "Salat, Eucharist, puja, meditation, pilgrimage, Sabbath practice, and festivals all transmit belonging through repetition." },
            { label: "Public ceremonies and civic religion", note: "Flags, anthems, oaths, memorials, and inaugurations reveal that ritual survives even where theology recedes." }
          ],
          timeline: [
            { era: "Oral cultures", note: "Ritual stabilizes memory before writing can externalize doctrine." },
            { era: "Temple and sacrificial systems", note: "Ritual becomes specialized, scheduled, and often administered by sacred professionals." },
            { era: "Modernity", note: "Ritual remains resilient, often migrating into secular forms." }
          ],
          links: [
            { title: "Britannica: Ritual and Rites of Passage", url: "https://www.britannica.com/topic/ritual/Rites-of-passage" },
            { title: "Britannica: Sacrifice in the Religions of the World", url: "https://www.britannica.com/topic/sacrifice-religion/Sacrifice-in-the-religions-of-the-world" },
            { title: "The Met: Temple of Dendur — Architecture and Ritual", url: "https://www.metmuseum.org/essays/temple-of-dendur-architecture-and-ritual" },
            { title: "The Met: Mesopotamian Magic in the First Millennium B.C.", url: "https://www.metmuseum.org/essays/mesopotamian-magic-in-the-first-millennium-bc" }
          ],
          tags: ["ritual", "initiation", "festival", "sacrifice"],
          pathways: ["death-afterlife", "sacred-space-time", "story-symbol"]
        },
        {
          id: "law-order",
          icon: "▣",
          title: "Law, Morality, and Cosmic Order",
          shortTitle: "Law",
          thesis: "As human groups scale up, rules need more force than preference. Religion often gives law and morality sacred backing: divine command, cosmic balance, karmic order, covenant, justice beyond death.",
          whyItRepeats: "Large groups need legitimacy. A rule tied to heaven, gods, ancestors, or cosmic order becomes harder to ignore than a rule tied only to human convenience.",
          insight: "Law becomes durable when it feels older than the ruler and larger than the crowd. Sacred authority often supplies that scale.",
          flash: "Once morality is attached to the architecture of the universe, disobedience stops looking like disagreement and starts looking like disorder itself.",
          examples: [
            { label: "Code of Hammurabi", note: "A legal corpus presented within a divine-political frame, showing how law and sacred legitimacy intertwine." },
            { label: "Ma'at, Dharma, Torah, Sharia, Canon Law", note: "Different traditions, same structural function: embed social order in a larger moral universe." },
            { label: "Judgment after death", note: "When moral accounting extends beyond visible life, social order gains metaphysical reinforcement." },
            { label: "Kingship and mandate traditions", note: "Political order is often justified by divine favor, cosmic balance, or sacred ancestry." }
          ],
          timeline: [
            { era: "Early states", note: "Law is often inseparable from divine kingship and cosmic order." },
            { era: "Scriptural civilizations", note: "Moral codes become portable through texts and commentary traditions." },
            { era: "Modern secular states", note: "Even after secularization, law often inherits sacred tones of inviolability and ritual procedure." }
          ],
          links: [
            { title: "Britannica: Code of Hammurabi", url: "https://www.britannica.com/topic/Code-of-Hammurabi" },
            { title: "World History Encyclopedia: Code of Hammurabi", url: "https://www.worldhistory.org/Code_of_Hammurabi/" },
            { title: "Stanford Encyclopedia: Religion and Morality", url: "https://plato.stanford.edu/entries/religion-morality/" }
          ],
          tags: ["law", "justice", "morality", "order"],
          pathways: ["survival-kinship", "death-afterlife", "story-symbol"]
        },
        {
          id: "sacred-space-time",
          icon: "△",
          title: "Sacred Space and Sacred Time",
          shortTitle: "Sacred Space",
          thesis: "Religions repeatedly carve ordinary reality into charged zones: temple, shrine, altar, mountain, tomb, pilgrimage route, holy day, fast, sabbath, and festival season.",
          whyItRepeats: "Marking some places and times as special helps groups enter shared seriousness and orient memory, hierarchy, and identity.",
          insight: "A sacred place is not just a location. It is an argument that reality has gradients, that some coordinates matter more than others.",
          flash: "Pilgrimage is geography turned into meaning. The road itself becomes doctrine with footsteps.",
          examples: [
            { label: "Pilgrimage traditions", note: "Hajj, Kumbh Mela, Jerusalem, Bodh Gaya, shrines, saint tombs, and sacred mountains all convert geography into meaning." },
            { label: "Temples, shrines, and precincts", note: "From Mesopotamian temenos to Egyptian temples to household altars, sacred architecture organizes access to power." },
            { label: "Calendrical time", note: "Feasts, fasts, lunar cycles, New Year rites, and weekly observances make time itself religiously structured." },
            { label: "Domestic sacred space", note: "Household altars, hearths, prayer corners, and ancestor tables miniaturize the cosmos inside everyday life." }
          ],
          timeline: [
            { era: "Sacred landscapes", note: "Mountains, rivers, caves, and burial grounds are often the earliest holy locations." },
            { era: "Temple cultures", note: "Sacred space becomes architecturally formalized and politically central." },
            { era: "Global pilgrimage and calendrical religion", note: "Space and time become portable through ritual schedules and travel networks." }
          ],
          links: [
            { title: "Britannica: Pilgrimage", url: "https://www.britannica.com/topic/pilgrimage-religion" },
            { title: "Britannica: Pilgrimage and the World", url: "https://www.britannica.com/topic/pilgrimage-religion/Pilgrimage-and-the-world" },
            { title: "MDPI: Sacred Space and Ritual Behaviour in Ancient Mesopotamia", url: "https://www.mdpi.com/2673-9461/4/3/15" },
            { title: "The Met: Divine Egypt", url: "https://www.metmuseum.org/exhibitions/divine-egypt" }
          ],
          tags: ["sacred space", "pilgrimage", "calendar", "temple"],
          pathways: ["ritual", "survival-kinship", "story-symbol"]
        },
        {
          id: "story-symbol",
          icon: "✦",
          title: "Story, Symbol, and God-Formation",
          shortTitle: "Gods",
          thesis: "A religion becomes durable when its stories, symbols, and practices stop feeling merely invented and begin functioning as reality-organizers. That is where big stories start behaving like gods.",
          whyItRepeats: "Humans are symbolic creatures. We do not only react to what is physically present; we live inside shared meanings, images, names, and inherited narratives.",
          insight: "A god can be understood as a story dense enough to organize emotion, attention, law, memory, and sacrifice across generations.",
          flash: "Even if a symbol begins as invention, repetition can make it operational. Enough devotion gives fiction civilizational weight.",
          examples: [
            { label: "Creation stories and world-order myths", note: "Different contents, same role: explain why there is something, why order matters, and where humans fit." },
            { label: "Living sacred images and texts", note: "Images, icons, scriptures, relics, and names become active interfaces between group memory and sacred presence." },
            { label: "Old gods and new gods", note: "The objects of devotion change over time, but the machinery of collective attention remains recognizable." },
            { label: "Secular symbolic power", note: "Nations, markets, celebrity, and ideology can absorb god-like features when they command ritual, sacrifice, and identity." }
          ],
          timeline: [
            { era: "Mythic worlds", note: "Narrative binds human activity to cosmic drama." },
            { era: "Textual religion", note: "Symbols become canonized, portable, and interpretable across time." },

          links: [

            { title: "Stanford Encyclopedia: Religion and Science", url: "https://plato.stanford.edu/archives/spr2022/entries/religion-science/" }
          ],
          tags: ["myth", "symbol", "god", "meaning"],
          pathways: ["death-afterlife", "ritual", "law-order"]
        }
      ];

      const guidedJourneys = [
        { id: "death-afterlife", label: "Start with death", description: "See how mortality generates ritual, justice, and gods." },
        { id: "ritual", label: "Start with ritual", description: "Watch belief become bodily repetition and group memory." },
        { id: "law-order", label: "Start with law", description: "Trace how sacred order scales fragile groups into civilizations." },
        { id: "story-symbol", label: "Start with gods", description: "Follow the route by which stories become operative realities." }
      ];

      const flashCards = [
        {
          kicker: "First principle",
          title: "Religion often answers recurring human conditions, not one-time historical accidents.",
          body: "Across distance and time, the same pressures return: vulnerability, death, uncertainty, conflict, memory, and the need for durable belonging."
        },
        {
          kicker: "Design insight",
          title: "Ritual is memory made physical.",
          body: "It lets a group carry meaning even when not everyone can explain the doctrine in abstract terms."

        {
          kicker: "Civilizational move",
          title: "Law becomes stickier when attached to the cosmos.",
          body: "Sacred framing turns preference into obligation and disagreement into disorder."
        }
      ];

      const state = {
        query: "",
        selected: "death-afterlife",
        mode: "map",
        detailView: "insight",
        flashIndex: 0
      };

      const app = document.getElementById('app');

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function filteredThemes() {
        const q = state.query.trim().toLowerCase();
        if (!q) return themes;
        return themes.filter((theme) => {
          const haystack = [
            theme.title,
            theme.shortTitle,
            theme.thesis,
            theme.whyItRepeats,
            theme.insight,
            theme.flash,
            ...(theme.tags || []),
            ...theme.examples.flatMap((e) => [e.label, e.note]),
            ...theme.timeline.flatMap((t) => [t.era, t.note]),
            ...theme.links.map((l) => l.title)
          ].join(' ').toLowerCase();
          return haystack.includes(q);
        });
      }

      function activeTheme(filtered) {
        return filtered.find((t) => t.id === state.selected) || filtered[0] || themes[0];
      }

      function buttonClass(base, active) {
        return active ? `${base} active-ui` : base;
      }

      function render() {
        const filtered = filteredThemes();
        if (!filtered.some((t) => t.id === state.selected) && filtered[0]) state.selected = filtered[0].id;
        const active = activeTheme(filtered);
        const related = active ? active.pathways.map((id) => themes.find((theme) => theme.id === id)).filter(Boolean) : [];
        const journey = guidedJourneys.find((j) => j.id === state.selected);
        const flash = flashCards[state.flashIndex % flashCards.length];

        app.innerHTML = `
          <div class="grid hero-grid">
            <section class="card">
              <div class="card-body">
                <div class="pill">◌ Religion + History Exploratorium</div>
                <h1 class="hero-title">Big stories, repeated structures, recurring gods</h1>
                <p class="hero-copy">A richer, more interactive browser-based map of common patterns across documented religions and historical societies: kinship, death, ritual, law, sacred space, and symbolic world-building.</p>
                <div class="spine"><strong style="color:#fafafa">Core spine:</strong> People are small and life is scary. So people stay together, make rules, and tell big stories to help them feel safe. When lots of people believe the same big story for a very long time, that story can start behaving like a god.</div>
                <div class="hero-stats">
                  <div class="stat"><div class="stat-number">6</div><div class="stat-label">structural pattern nodes that recur across religions and civilizations</div></div>
                  <div class="stat"><div class="stat-number">24+</div><div class="stat-label">cross-civilizational examples and historical touchpoints</div></div>
                  <div class="stat"><div class="stat-number">1</div><div class="stat-label">central question: what do humans keep building when life feels fragile?</div></div>
                </div>
              </div>
            </section>
            <aside class="card">
              <div class="card-body">
                <div class="eyebrow">How to navigate</div>
                <h3 style="font-size:1.35rem">Every click should collapse complexity into one clean idea.</h3>
                <p class="hero-copy" style="margin-top:12px">This experience does not claim to prove metaphysics. It shows that recurring human conditions repeatedly generate recurring religious structures.</p>
                <div class="stack" style="margin-top:16px">
                  <div class="stat"><strong>✦ Start with a guided path</strong><div class="small" style="margin-top:8px">Choose death, ritual, law, or gods and move outward from one strong insight.</div></div>
                  <div class="stat"><strong>◎ Use cross-links</strong><div class="small" style="margin-top:8px">The point is not isolated topics. The point is how each pattern feeds the others.</div></div>
                  <div class="stat"><strong>→ Leave through evidence</strong><div class="small" style="margin-top:8px">Each node sends you outward to reference sources, museum essays, and philosophy entries.</div></div>
                </div>
              </div>
            </aside>
          </div>

          <div class="top-strip">
            <section class="card"><div class="card-body">
              <div class="eyebrow">Guided journeys</div>
              <h3 style="font-size:1.25rem">Choose a path that reveals the machinery.</h3>
              <div class="story-paths">
                ${guidedJourneys.map((j) => `<button class="${buttonClass('path-btn', state.selected === j.id)}" data-select="${j.id}">${escapeHtml(j.label)}</button>`).join('')}
              </div>
              <p class="footer-note">${escapeHtml(journey ? journey.description : 'Choose one entry point and let the cross-links do the rest.')}</p>
            </div></section>
            <section class="card"><div class="card-body">
              <div class="eyebrow">Flash of insight</div>
              <div class="flash-grid">
                ${flashCards.map((card, idx) => `<button class="flash-card" data-flash="${idx}" style="${idx === state.flashIndex ? 'border-color: rgba(156,196,255,0.35); background: linear-gradient(180deg, rgba(156,196,255,0.12), rgba(255,255,255,0.03));' : ''}"><div class="eyebrow" style="margin-bottom:8px">${escapeHtml(card.kicker)}</div><div class="example-title">${escapeHtml(card.title)}</div><div class="small" style="margin-top:8px">${escapeHtml(card.body)}</div></button>`).join('')}
              </div>
              <div class="insight-banner" style="margin-top:14px"><strong>${escapeHtml(flash.title)}</strong> ${escapeHtml(flash.body)}</div>
            </div></section>
          </div>

          <div class="grid main-grid" style="margin-top:22px">
            <aside class="card sidebar">
              <div class="card-body">
                <div class="search-wrap">
                  <span class="search-icon">⌕</span>
                  <input id="theme-search" class="search-input" value="${escapeHtml(state.query)}" placeholder="Search death, burial, pilgrimage, law, ancestor..." />
                </div>
                <div class="toggle-row">
                  <button class="${buttonClass('toggle', state.mode === 'map')}" data-mode="map">Map</button>
                  <button class="${buttonClass('toggle', state.mode === 'library')}" data-mode="library">Library</button>
                </div>
                <div class="small-toggle-row">
                  <button class="${buttonClass('small-btn', state.detailView === 'insight')}" data-detail="insight">Insight</button>
                  <button class="${buttonClass('small-btn', state.detailView === 'timeline')}" data-detail="timeline">Timeline</button>
                  <button class="${buttonClass('small-btn', state.detailView === 'crosslinks')}" data-detail="crosslinks">Cross-links</button>
                </div>
                <div class="node-list">
                  ${filtered.length === 0 ? `<div class="empty-state">No matches. Try broader terms like <em>death</em>, <em>law</em>, <em>ancestor</em>, or <em>pilgrimage</em>.</div>` : filtered.map((theme) => `
                    <button class="${buttonClass('node-btn', active && active.id === theme.id)}" data-select="${theme.id}">
                      <div class="node-top">
                        <div class="node-icon">${escapeHtml(theme.icon)}</div>
                        <div>
                          <div class="node-title">${escapeHtml(theme.title)}</div>
                          <div class="node-sub">${escapeHtml(theme.thesis)}</div>
                        </div>
                      </div>
                      <div>${theme.tags.slice(0,3).map((tag) => `<span class="mini-chip">${escapeHtml(tag)}</span>`).join('')}</div>
                    </button>
                  `).join('')}
                </div>
              </div>
            </aside>

            <main class="card content-card">
              <div class="card-body">
                ${state.mode === 'map' && active ? renderMap(active, related) : renderLibrary(filtered)}
              </div>
            </main>
          </div>

          <div class="footer-grid" style="margin-top:22px">
            <section class="card"><div class="card-body"><div class="eyebrow">What this suggests</div><h3>Religions differ in content, but often solve the same classes of problems.</h3><p class="hero-copy" style="margin-top:10px">Mortality, order, belonging, uncertainty, memory, and symbolic cohesion recur so often that similar sacred structures keep reappearing.</p></div></section>
            <section class="card"><div class="card-body"><div class="eyebrow">What it does not claim</div><h3>This is a map of commonality, not a final verdict on metaphysics.</h3><p class="hero-copy" style="margin-top:10px">It does not prove or disprove any deity. It shows how recurring human conditions repeatedly generate recurring religious forms.</p></div></section>
            <section class="card"><div class="card-body"><div class="eyebrow">Best next move</div><h3>Follow one node all the way outward.</h3><p class="hero-copy" style="margin-top:10px">Start with death, ritual, law, or gods. Then test the pattern against civilizations far apart in geography, time, and doctrine.</p></div></section>
          </div>
        `;

        bindEvents();
      }

      function renderMap(active, related) {
        const detailPanel = state.detailView === 'timeline'
          ? `<div><div class="eyebrow">Timeline lens</div><h3 style="margin-bottom:14px">How the pattern unfolds over time</h3><div class="timeline">${active.timeline.map((item) => `<div class="timeline-event"><div class="timeline-era">${escapeHtml(item.era)}</div><div class="small" style="margin-top:6px">${escapeHtml(item.note)}</div></div>`).join('')}</div></div>`
          : state.detailView === 'crosslinks'
            ? `<div><div class="eyebrow">Cross-links</div><h3 style="margin-bottom:14px">Where this node connects</h3><div class="cross-grid">${related.map((theme) => `<button class="cross-link" data-select="${theme.id}"><div class="cross-title">${escapeHtml(theme.icon)} ${escapeHtml(theme.title)}</div><div class="cross-copy">${escapeHtml(theme.thesis)}</div></button>`).join('')}</div></div>`
            : `<div><div class="eyebrow">Further exploration</div><h3 style="margin-bottom:14px">Open reference trails</h3><div class="stack">${active.links.map((link) => `<a class="source-link" href="${escapeHtml(link.url)}" target="_blank" rel="noreferrer noopener"><div class="source-title">${escapeHtml(link.title)} ↗</div><div class="source-url">${escapeHtml(link.url)}</div></a>`).join('')}</div></div>`;

        return `
          <div class="stack">
            <div>
              <div class="pill">${escapeHtml(active.icon)} Pattern Node</div>
              <h2 style="margin-top:16px">${escapeHtml(active.title)}</h2>
              <p class="lead">${escapeHtml(active.thesis)}</p>
              <div class="navigator">${related.map((theme) => `<button class="chip" data-select="${theme.id}">Jump to ${escapeHtml(theme.shortTitle)}</button>`).join('')}</div>
            </div>
            <div class="metric-row">
              <div class="metric-box"><div class="eyebrow">Core function</div><div>${escapeHtml(active.tags[0])} becomes a gateway into larger order.</div></div>
              <div class="metric-box"><div class="eyebrow">Structural move</div><div>Private vulnerability is converted into shared pattern.</div></div>
              <div class="metric-box"><div class="eyebrow">What it builds</div><div>Durability across memory, bodies, and generations.</div></div>
            </div>
            <div class="insight-banner"><strong>Flash insight:</strong> ${escapeHtml(active.flash)}</div>
            <div class="two-grid">
              <section class="inner-card"><div class="eyebrow">Why it repeats</div><p class="lead" style="margin-top:0">${escapeHtml(active.whyItRepeats)}</p></section>
              <section class="inner-card"><div class="eyebrow">Primary insight</div><p class="lead" style="margin-top:0">${escapeHtml(active.insight)}</p></section>
            </div>
            <div class="split-grid">
              <section class="inner-card"><div class="eyebrow">Examples across history and religion</div><h3 style="margin-bottom:14px">Not identical beliefs. Repeating structural moves.</h3><div class="stack">${active.examples.map((example, idx) => `<article class="example-card"><div class="example-title">${escapeHtml(example.label)}</div><div class="small" style="margin-top:8px">${escapeHtml(example.note)}</div></article>`).join('')}</div></section>
              <section class="inner-card">${detailPanel}</section>
            </div>
          </div>
        `;
      }

      function renderLibrary(filtered) {
        if (filtered.length === 0) return `<div class="empty-state">No source matches for this search yet. Try broader terms like <em>ritual</em>, <em>afterlife</em>, or <em>myth</em>.</div>`;
        return `
          <div>
            <div class="eyebrow">Source library</div>
            <h2>Browse evidence by pattern</h2>
            <p class="lead">This is the source-first view: move from node to reference without losing the larger architecture.</p>
            <div class="library-grid">
              ${filtered.map((theme) => `
                <section class="inner-card">
                  <div class="eyebrow">${escapeHtml(theme.icon)} ${escapeHtml(theme.tags.join(' • '))}</div>
                  <h3 style="margin-bottom:10px">${escapeHtml(theme.title)}</h3>
                  <p class="small" style="margin-bottom:16px">${escapeHtml(theme.thesis)}</p>
                  <div class="stack">${theme.links.map((link) => `<a class="source-link" href="${escapeHtml(link.url)}" target="_blank" rel="noreferrer noopener"><div class="source-title">${escapeHtml(link.title)} ↗</div></a>`).join('')}</div>
                  <div class="navigator" style="margin-top:14px"><button class="chip" data-select="${theme.id}" data-map="1">Open node</button></div>
                </section>
              `).join('')}
            </div>
          </div>
        `;
      }

      function bindEvents() {
        const search = document.getElementById('theme-search');
        if (search) {
          search.addEventListener('input', (e) => {
            state.query = e.target.value;
            render();
          });
        }

        document.querySelectorAll('[data-select]').forEach((el) => {
          el.addEventListener('click', () => {
            state.selected = el.getAttribute('data-select');
            if (el.hasAttribute('data-map')) state.mode = 'map';
            render();
          });
        });

        document.querySelectorAll('[data-mode]').forEach((el) => {
          el.addEventListener('click', () => {
            state.mode = el.getAttribute('data-mode');
            render();
          });
        });

        document.querySelectorAll('[data-detail]').forEach((el) => {
          el.addEventListener('click', () => {
            state.detailView = el.getAttribute('data-detail');
            render();
          });
        });

        document.querySelectorAll('[data-flash]').forEach((el) => {
          el.addEventListener('click', () => {
            state.flashIndex = Number(el.getAttribute('data-flash')) || 0;
            render();
          });
        });
      }

      render();
      setInterval(() => {
        state.flashIndex = (state.flashIndex + 1) % flashCards.length;
        render();
      }, 5200);
    </script>
  </body>
</html>
